services:
  - type: worker
    name: leadscraper-bot
    runtime: python
    envVars:
      - key: CREDENTIALS
        sync: false  # Paste your service account JSON string here in Render dashboard
      - key: SHEET_ID
        fromEnv: SHEET_ID  # Set in Render dashboard

      - key: PYTHONUNBUFFERED
        value: "1"
    buildCommand: pip install -r requirements.txt
    startCommand: python fixed_google_sheet_uploader_v2.py --schedule

